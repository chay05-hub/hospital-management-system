<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        .content { flex-grow: 1; min-height: 100vh; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="content p-4">
            <h2 class="mb-4">System Dashboard</h2>
            <div class="row text-white text-center">
                <div class="col-md-3 mb-4">
                    <div class="card bg-primary p-4 shadow-sm border-0">
                        <h4>Patients</h4>
                        <h2 th:text="${patientCount}">0</h2>
                        <a href="/patients" class="text-white text-decoration-none small">View more &rarr;</a>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="card bg-success p-4 shadow-sm border-0">
                        <h4>Doctors</h4>
                        <h2 th:text="${doctorCount}">0</h2>
                        <a href="/doctors" class="text-white text-decoration-none small">View more &rarr;</a>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="card bg-warning text-dark p-4 shadow-sm border-0">
                        <h4>Employees</h4>
                        <h2 th:text="${employeeCount}">0</h2>
                        <a href="/employees" class="text-dark text-decoration-none small">View more &rarr;</a>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="card bg-danger p-4 shadow-sm border-0">
                        <h4>Departments</h4>
                        <h2 th:text="${departmentCount}">0</h2>
                        <a href="/departments" class="text-white text-decoration-none small">View more &rarr;</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
