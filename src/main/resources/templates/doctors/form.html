<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        .content { flex-grow: 1; min-height: 100vh; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="content p-4">
            <h2 class="mb-4" th:text="${doctor.id == null ? 'Add Doctor' : 'Edit Doctor'}">Doctor Form</h2>
            <div class="card shadow-sm p-4 w-50 border-0">
                <form th:action="@{/doctors/save}" th:object="${doctor}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Specialization</label>
                        <input type="text" class="form-control" th:field="*{specialization}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact</label>
                        <input type="text" class="form-control" th:field="*{contact}">
                    </div>
                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="/doctors" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
