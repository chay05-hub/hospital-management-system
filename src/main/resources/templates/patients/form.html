<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        .content { flex-grow: 1; min-height: 100vh; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="content p-4">
            <h2 class="mb-4" th:text="${patient.id == null ? 'Add Patient' : 'Edit Patient'}">Patient Form</h2>
            
            <div class="card shadow-sm p-4 w-50 border-0">
                <form th:action="@{/patients/save}" th:object="${patient}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" th:field="*{age}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Gender</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact</label>
                        <input type="text" class="form-control" th:field="*{contact}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Blood Group</label>
                        <input type="text" class="form-control" th:field="*{bloodGroup}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" th:field="*{address}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Medical History</label>
                        <textarea class="form-control" th:field="*{medicalHistory}"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="/patients" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
