<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        .content { flex-grow: 1; min-height: 100vh; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="content p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Employee List</h2>
                <a href="/employees/add" class="btn btn-primary">+ Add Employee</a>
            </div>
            <div class="card bg-white p-3 shadow-sm rounded border-0">
                <table class="table table-hover table-bordered mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Email</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${employees}">
                            <td th:text="${e.id}">1</td>
                            <td th:text="${e.name}">Name</td>
                            <td th:text="${e.role}">Role</td>
                            <td th:text="${e.email}">Email</td>
                            <td th:text="${e.contact}">Contact</td>
                            <td>
                                <a th:href="@{/employees/edit/{id}(id=${e.id})}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{/employees/delete/{id}(id=${e.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this employee?');">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="6" class="text-center text-muted">No employees found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
